name: build-and-release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: sidecar/requirements.txt
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - name: Install frontend dependencies
        run: npm ci
      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageVersion = (Get-Content -Raw -Encoding UTF8 package.json | ConvertFrom-Json).version
          $tauriVersion = (Get-Content -Raw -Encoding UTF8 src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargoVersionMatch = Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1
          if (-not $cargoVersionMatch) {
            throw 'Unable to read the package version from src-tauri/Cargo.toml'
          }
          $cargoVersion = $cargoVersionMatch.Matches[0].Groups[1].Value
          $expectedTag = "v$packageVersion"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag $env:GITHUB_REF_NAME does not match package version $expectedTag"
          }
          if ($tauriVersion -ne $packageVersion -or $cargoVersion -ne $packageVersion) {
            throw "Version mismatch: package.json=$packageVersion, tauri.conf.json=$tauriVersion, Cargo.toml=$cargoVersion"
          }
      - name: Check frontend
        run: npm run check
      - name: Test frontend
        run: npm test
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
      - name: Build frontend
        run: npm run build
      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Lint Rust backend
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Audit Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
      - name: Install sidecar dependencies
        run: python -m pip install -r sidecar/requirements.txt
      - name: Test Python sidecar
        run: python -m unittest discover -s sidecar/tests -v
      - name: Audit Python dependencies
        run: |
          python -m pip install pip-audit==2.9.0
          python -m pip_audit -r sidecar/requirements.txt

  desktop:
    name: Build ${{ matrix.artifact }}
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-x86_64
          - os: macos-15-intel
            artifact: macos-x86_64
          - os: macos-15
            artifact: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: sidecar/requirements-build.txt
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - name: Install frontend dependencies
        run: npm ci
      - name: Build desktop bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.os, 'macos-') && '-' || '' }}
        run: npm run tauri:bundle
      - name: Prepare release assets
        shell: pwsh
        run: |
          $version = (Get-Content -Raw -Encoding UTF8 package.json | ConvertFrom-Json).version
          $releaseDirectory = Join-Path $PWD 'release-assets'
          New-Item -ItemType Directory -Force -Path $releaseDirectory | Out-Null

          if ($env:RUNNER_OS -eq 'Windows') {
            $msi = Get-ChildItem 'src-tauri/target/release/bundle/msi' -Filter '*.msi' | Select-Object -First 1
            $installer = Get-ChildItem 'src-tauri/target/release/bundle/nsis' -Filter '*.exe' | Select-Object -First 1
            if (-not $msi -or -not $installer) {
              throw 'Expected both MSI and NSIS installers'
            }
            Copy-Item $msi.FullName (Join-Path $releaseDirectory "ai-job-app-v$version-windows-x86_64-unsigned.msi")
            Copy-Item $installer.FullName (Join-Path $releaseDirectory "ai-job-app-v$version-windows-x86_64-unsigned-setup.exe")
          } else {
            $dmg = Get-ChildItem 'src-tauri/target/release/bundle/dmg' -Filter '*.dmg' | Select-Object -First 1
            if (-not $dmg) {
              throw 'Expected a macOS DMG installer'
            }
            Copy-Item $dmg.FullName (Join-Path $releaseDirectory "ai-job-app-v$version-${{ matrix.artifact }}-unsigned.dmg")
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: desktop
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          if [ "${#assets[@]}" -ne 4 ]; then
            echo "Expected 4 release assets, found ${#assets[@]}" >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "AI Job App $GITHUB_REF_NAME" \
              --generate-notes
          fi

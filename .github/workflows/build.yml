name: quality-build-release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-history:
    name: Full-history secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Gitleaks full history with redacted output
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.27.2 git --redact --no-banner --log-opts="--all" /repo

  quality:
    name: Quality checks
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
          cache: npm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13.6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.24
          enable-cache: true
          cache-dependency-glob: sidecar/uv.lock
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Verify synchronized release inputs
        env:
          REQUIRE_UPDATER_KEY: 1
        run: npm run release:verify
      - name: Verify Python lock is current
        run: uv lock --project sidecar --check
      - name: Install locked Python runtime dependencies
        run: uv sync --project sidecar --locked --no-install-project
      - run: npm run format:check
      - run: npm run lint
      - run: npm run check
      - run: uv run --project sidecar --locked --no-sync ruff format --check sidecar
      - run: uv run --project sidecar --locked --no-sync ruff check sidecar
      - run: npm test
      - run: npm run build
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings
      - run: uv run --project sidecar --locked --no-sync python -m unittest discover -s sidecar/tests -v
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
      - name: Audit Rust dependencies
        uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432 # post-v2 Node 24 migration
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
          # Tauri's GTK stack currently pins glib 0.18. This advisory is Linux-only,
          # while this release supports Windows and macOS only.
          ignore: RUSTSEC-2024-0429
      - name: Audit locked Python dependencies
        shell: pwsh
        run: |
          uv export --project sidecar --locked --no-dev --no-emit-project --output-file "$env:RUNNER_TEMP\sidecar-requirements.txt"
          uv tool run --from pip-audit==2.9.0 pip-audit -r "$env:RUNNER_TEMP\sidecar-requirements.txt"
      - name: Validate generated dependency inventory
        shell: pwsh
        run: |
          node scripts/generate-sbom.mjs "$env:RUNNER_TEMP\sbom.json" quality
          node scripts/generate-third-party-list.mjs "$env:RUNNER_TEMP\third-party-dependencies.txt"
          Get-Content -Raw -Encoding UTF8 "$env:RUNNER_TEMP\sbom.json" | ConvertFrom-Json | Out-Null

  updater-e2e:
    name: Temporary-key updater ${{ matrix.platform }}
    needs: [quality, secret-history]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
          - os: macos-15
            platform: darwin-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
          cache: npm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13.6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.24
          enable-cache: true
          cache-dependency-glob: sidecar/uv.lock
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Verify download, signature, progress, install and restart
        shell: pwsh
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
        run: ./scripts/test-updater-e2e.ps1

  desktop:
    name: Build and smoke-test ${{ matrix.artifact }}
    needs: [quality, secret-history, updater-e2e]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-x86_64
          - os: macos-15-intel
            artifact: macos-x86_64
          - os: macos-15
            artifact: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
          cache: npm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13.6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.24
          enable-cache: true
          cache-dependency-glob: sidecar/uv.lock
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Require updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) { throw 'Missing TAURI_SIGNING_PRIVATE_KEY' }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) { throw 'Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD' }
      - name: Build signed updater artifacts and unsigned platform installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.os, 'macos-') && '-' || '' }}
        run: npm run tauri:bundle
      - name: Prepare immutable release assets
        shell: pwsh
        run: |
          $version = (Get-Content -Raw -Encoding UTF8 package.json | ConvertFrom-Json).version
          $releaseDirectory = Join-Path $PWD 'release-assets'
          New-Item -ItemType Directory -Force -Path $releaseDirectory | Out-Null
          if ($env:RUNNER_OS -eq 'Windows') {
            $installer = Get-ChildItem 'src-tauri/target/release/bundle/nsis' -Filter '*.exe' | Select-Object -First 1
            if (-not $installer -or -not (Test-Path "$($installer.FullName).sig")) { throw 'Expected signed NSIS updater artifacts' }
            $name = "ai-job-app-v$version-windows-x86_64-unsigned-setup.exe"
            Copy-Item $installer.FullName (Join-Path $releaseDirectory $name)
            Copy-Item "$($installer.FullName).sig" (Join-Path $releaseDirectory "$name.sig")
          } else {
            $dmg = Get-ChildItem 'src-tauri/target/release/bundle/dmg' -Filter '*.dmg' | Select-Object -First 1
            $updater = Get-ChildItem 'src-tauri/target/release/bundle/macos' -Filter '*.app.tar.gz' | Select-Object -First 1
            if (-not $dmg -or -not $updater -or -not (Test-Path "$($updater.FullName).sig")) { throw 'Expected DMG and signed app.tar.gz updater artifacts' }
            $dmgName = "ai-job-app-v$version-${{ matrix.artifact }}-unsigned.dmg"
            $updaterName = "ai-job-app-v$version-${{ matrix.artifact }}-unsigned.app.tar.gz"
            Copy-Item $dmg.FullName (Join-Path $releaseDirectory $dmgName)
            Copy-Item $updater.FullName (Join-Path $releaseDirectory $updaterName)
            Copy-Item "$($updater.FullName).sig" (Join-Path $releaseDirectory "$updaterName.sig")
          }
          node scripts/generate-sbom.mjs (Join-Path $releaseDirectory "ai-job-app-v$version-${{ matrix.artifact }}.cdx.json") "${{ matrix.artifact }}"
          $checksum = Get-ChildItem $releaseDirectory -File | Sort-Object Name | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          }
          [IO.File]::WriteAllLines((Join-Path $releaseDirectory "SHA256SUMS-${{ matrix.artifact }}.txt"), $checksum, [Text.UTF8Encoding]::new($false))
      - name: Windows NSIS install, upgrade, sidecar and retention smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem release-assets -Filter '*-setup.exe' | Select-Object -First 1
          $firstInstall = Start-Process $installer.FullName -ArgumentList '/S' -PassThru -Wait
          if ($firstInstall.ExitCode -ne 0) { throw "First NSIS install exited with $($firstInstall.ExitCode)" }
          $upgradeInstall = Start-Process $installer.FullName -ArgumentList '/S' -PassThru -Wait
          if ($upgradeInstall.ExitCode -ne 0) { throw "NSIS overwrite upgrade exited with $($upgradeInstall.ExitCode)" }
          $uninstallRoot = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall'
          $entry = Get-ChildItem $uninstallRoot | ForEach-Object { Get-ItemProperty $_.PSPath } |
            Where-Object { $_.DisplayIcon -match 'ai-job-app\.exe' } |
            Sort-Object DisplayVersion -Descending | Select-Object -First 1
          if (-not $entry) { throw 'Installed application registry entry was not found' }
          $appPath = [Environment]::ExpandEnvironmentVariables([string]$entry.DisplayIcon).Trim()
          if ($appPath -match '^"([^"]+)"') { $appPath = $Matches[1] } else { $appPath = $appPath -replace ',\d+$', '' }
          $app = Get-Item -LiteralPath $appPath -ErrorAction Stop
          if (-not (Test-Path (Join-Path $app.DirectoryName 'job-assistant-sidecar.exe'))) {
            throw 'Installed sidecar executable was not found'
          }
          $legacyDirectory = Join-Path $env:APPDATA 'io.github.kylekw.aijobapp'
          New-Item -ItemType Directory -Force -Path $legacyDirectory | Out-Null
          $env:LEGACY_DATABASE = Join-Path $legacyDirectory 'ai-job-app.db'
          $env:LEGACY_FIXTURE = Join-Path $PWD 'src-tauri/tests/fixtures/v0.1.7.sql'
          python -c "import os,sqlite3; c=sqlite3.connect(os.environ['LEGACY_DATABASE']); c.executescript(open(os.environ['LEGACY_FIXTURE'],encoding='utf-8').read()); c.close()"
          $marker = Join-Path $env:RUNNER_TEMP 'desktop-smoke.json'
          $env:AI_JOB_APP_SMOKE_RESULT = $marker
          Start-Process $app.FullName -Wait
          $result = Get-Content -Raw -Encoding UTF8 $marker | ConvertFrom-Json
          if (-not $result.ok -or $result.schemaVersion -lt 5) { throw 'Application/database/sidecar smoke failed' }
          $database = Join-Path $env:APPDATA 'io.github.aijobapp\ai-job-app.db'
          if (-not (Test-Path $database)) { throw 'Application database was not created' }
          if (-not (Test-Path $env:LEGACY_DATABASE)) { throw 'v0.1.7 legacy data was not retained after migration' }
          $uninstaller = Get-ChildItem $app.DirectoryName -Filter 'uninstall*.exe' | Select-Object -First 1
          if ($uninstaller) { Start-Process $uninstaller.FullName -ArgumentList '/S' -Wait }
          if (-not (Test-Path $database)) { throw 'Normal uninstall unexpectedly removed user data' }
      - name: macOS DMG mount, launch, database and sidecar smoke
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          dmg="$(find release-assets -name '*.dmg' -print -quit)"
          mount="$RUNNER_TEMP/aijob-dmg"
          marker="$RUNNER_TEMP/desktop-smoke.json"
          mkdir -p "$mount"
          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount"
          app="$(find "$mount" -maxdepth 1 -name '*.app' -print -quit)"
          binary="$(find "$app/Contents/MacOS" -maxdepth 1 -type f -perm +111 ! -name '*sidecar*' -print -quit)"
          legacy="$HOME/Library/Application Support/io.github.kylekw.aijobapp/ai-job-app.db"
          current="$HOME/Library/Application Support/io.github.aijobapp/ai-job-app.db"
          mkdir -p "$(dirname "$legacy")"
          LEGACY_DATABASE="$legacy" LEGACY_FIXTURE="$PWD/src-tauri/tests/fixtures/v0.1.7.sql" python3 -c 'import os,sqlite3; c=sqlite3.connect(os.environ["LEGACY_DATABASE"]); c.executescript(open(os.environ["LEGACY_FIXTURE"],encoding="utf-8").read()); c.close()'
          AI_JOB_APP_SMOKE_RESULT="$marker" "$binary"
          MARKER="$marker" python3 -c 'import json,os; v=json.load(open(os.environ["MARKER"])); assert v["ok"] and v["schemaVersion"] >= 5'
          test -f "$current"
          test -f "$legacy"
          hdiutil detach "$mount"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Verify and publish immutable GitHub Release
    needs: desktop
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true
      - name: Verify artifacts, create updater manifest, and select public assets
        shell: bash
        run: |
          set -euo pipefail
          test "$(find release-assets -name '*windows-x86_64-unsigned-setup.exe' | wc -l)" -eq 1
          test "$(find release-assets -name '*macos-x86_64-unsigned.dmg' | wc -l)" -eq 1
          test "$(find release-assets -name '*macos-aarch64-unsigned.dmg' | wc -l)" -eq 1
          test "$(find release-assets -name '*.sig' | wc -l)" -eq 3
          test "$(find release-assets -name '*.cdx.json' | wc -l)" -eq 3
          node scripts/generate-latest-json.mjs release-assets "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME"
          node -e "const m=require('./release-assets/latest.json'); if(Object.keys(m.platforms).sort().join(',') !== 'darwin-aarch64,darwin-x86_64,windows-x86_64') process.exit(1)"
          version="${GITHUB_REF_NAME#v}"
          node scripts/write-release-notes.mjs "$version" "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"
          mkdir release-publish
          public_assets=(
            "ai-job-app-v${version}-macos-aarch64-unsigned.app.tar.gz"
            "ai-job-app-v${version}-macos-aarch64-unsigned.dmg"
            "ai-job-app-v${version}-macos-x86_64-unsigned.app.tar.gz"
            "ai-job-app-v${version}-macos-x86_64-unsigned.dmg"
            "ai-job-app-v${version}-windows-x86_64-unsigned-setup.exe"
            "latest.json"
          )
          for asset in "${public_assets[@]}"; do
            test -f "release-assets/$asset"
            cp "release-assets/$asset" "release-publish/$asset"
          done
          test "$(find release-publish -maxdepth 1 -type f | wc -l)" -eq 6
      - name: Create or recover draft, verify assets, then publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            is_draft="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')"
            if [ "$is_draft" != "true" ]; then
              echo "Published release $GITHUB_REF_NAME already exists; immutable releases cannot be overwritten." >&2
              exit 1
            fi
            echo "Recovering unpublished draft $GITHUB_REF_NAME"
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --draft \
              --title "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/release-notes.md"
            mapfile -t existing_assets < <(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
            for asset in "${existing_assets[@]}"; do
              gh release delete-asset "$GITHUB_REF_NAME" "$asset" --repo "$GITHUB_REPOSITORY" --yes
            done
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --draft \
              --title "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
          mapfile -d '' assets < <(find release-publish -maxdepth 1 -type f -print0 | sort -z)
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY"
          local_count="${#assets[@]}"
          remote_count="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets | length')"
          test "$local_count" -eq "$remote_count"
          find release-publish -maxdepth 1 -type f -printf '%f\n' | sort > "$RUNNER_TEMP/local-assets.txt"
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort > "$RUNNER_TEMP/remote-assets.txt"
          diff -u "$RUNNER_TEMP/local-assets.txt" "$RUNNER_TEMP/remote-assets.txt"
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest

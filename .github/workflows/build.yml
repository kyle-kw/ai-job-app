name: quality-build-release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-history:
    name: Full-history secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Gitleaks full history with redacted output
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.27.2 git --redact --no-banner --log-opts="--all" /repo

  quality:
    name: Quality checks
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.13.6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.24
          enable-cache: true
          cache-dependency-glob: sidecar/uv.lock
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Verify synchronized release inputs
        env:
          REQUIRE_UPDATER_KEY: 1
        run: npm run release:verify
      - name: Verify Python lock is current
        run: uv lock --project sidecar --check
      - name: Install locked Python runtime dependencies
        run: uv sync --project sidecar --locked --no-install-project
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings
      - run: uv run --project sidecar --locked --no-sync python -m unittest discover -s sidecar/tests -v
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
      - name: Audit Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
          # Tauri's GTK stack currently pins glib 0.18. This advisory is Linux-only,
          # while this release supports Windows and macOS only.
          ignore: RUSTSEC-2024-0429
      - name: Audit locked Python dependencies
        shell: pwsh
        run: |
          uv export --project sidecar --locked --no-dev --no-emit-project --output-file "$env:RUNNER_TEMP\sidecar-requirements.txt"
          uv tool run --from pip-audit==2.9.0 pip-audit -r "$env:RUNNER_TEMP\sidecar-requirements.txt"
      - name: Validate generated dependency inventory
        shell: pwsh
        run: |
          node scripts/generate-sbom.mjs "$env:RUNNER_TEMP\sbom.json" quality
          node scripts/generate-third-party-list.mjs "$env:RUNNER_TEMP\third-party-dependencies.txt"
          Get-Content -Raw -Encoding UTF8 "$env:RUNNER_TEMP\sbom.json" | ConvertFrom-Json | Out-Null

  updater-e2e:
    name: Temporary-key updater download/install/restart
    needs: [quality, secret-history]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.13.6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.24
          enable-cache: true
          cache-dependency-glob: sidecar/uv.lock
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build v0.2.0 and v0.2.1 with an isolated updater key
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $key = Join-Path $env:RUNNER_TEMP 'updater-e2e.key'
          $password = [Guid]::NewGuid().ToString('N')
          node node_modules/@tauri-apps/cli/tauri.js signer generate --ci --password $password --write-keys $key
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path "$key.pub")) { throw 'Could not generate temporary updater key' }
          $env:TAURI_SIGNING_PRIVATE_KEY = [IO.File]::ReadAllText($key).Trim()
          $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = $password
          $publicKey = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes([IO.File]::ReadAllText("$key.pub")))
          $testConfig = Join-Path $env:RUNNER_TEMP 'tauri.updater-e2e.json'
          $config = @{
            bundle = @{
              targets = @('nsis')
              createUpdaterArtifacts = $true
              externalBin = @('binaries/job-assistant-sidecar')
              windows = @{ webviewInstallMode = @{ type = 'skip' } }
            }
            plugins = @{
              updater = @{
                endpoints = @('https://127.0.0.1:18443/latest.json')
                pubkey = $publicKey
                dangerousAcceptInvalidCerts = $true
                windows = @{ installMode = 'passive' }
              }
            }
          }
          [IO.File]::WriteAllText($testConfig, ($config | ConvertTo-Json -Depth 10), [Text.UTF8Encoding]::new($false))

          function Build-Test-Version([string]$version) {
            node scripts/set-version.mjs $version
            if ($LASTEXITCODE -ne 0) { throw "Could not set test version $version" }
            python scripts/build_sidecar.py
            if ($LASTEXITCODE -ne 0) { throw "Could not build sidecar $version" }
            node node_modules/@tauri-apps/cli/tauri.js build --config $testConfig
            if ($LASTEXITCODE -ne 0) { throw "Could not build desktop test version $version" }
          }

          $serverRoot = Join-Path $env:RUNNER_TEMP 'updater-server'
          New-Item -ItemType Directory -Force -Path $serverRoot | Out-Null
          Build-Test-Version '0.2.1'
          $update = Get-ChildItem 'src-tauri/target/release/bundle/nsis' -Filter '*0.2.1*x64-setup.exe' | Select-Object -First 1
          if (-not $update -or -not (Test-Path "$($update.FullName).sig")) { throw 'Missing signed updater test artifact' }
          Copy-Item $update.FullName (Join-Path $serverRoot 'update.exe')
          $signature = [IO.File]::ReadAllText("$($update.FullName).sig").Trim()

          Build-Test-Version '0.2.0'
          $base = Get-ChildItem 'src-tauri/target/release/bundle/nsis' -Filter '*0.2.0*x64-setup.exe' | Select-Object -First 1
          if (-not $base) { throw 'Missing base updater test installer' }
          $manifest = @{
            version = '0.2.1'
            notes = 'Temporary updater end-to-end validation'
            pub_date = [DateTimeOffset]::UtcNow.ToString('o')
            platforms = @{
              'windows-x86_64' = @{
                signature = $signature
                url = 'https://127.0.0.1:18443/update.exe'
              }
            }
          }
          [IO.File]::WriteAllText((Join-Path $serverRoot 'latest.json'), ($manifest | ConvertTo-Json -Depth 8), [Text.UTF8Encoding]::new($false))
          "UPDATER_E2E_BASE=$($base.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "UPDATER_E2E_ROOT=$serverRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Verify HTTPS download, signature, progress, passive install and restart
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $certificate = Join-Path $env:RUNNER_TEMP 'updater-e2e.crt'
          $privateKey = Join-Path $env:RUNNER_TEMP 'updater-e2e-tls.key'
          openssl req -x509 -newkey rsa:2048 -sha256 -days 1 -nodes -keyout $privateKey -out $certificate -subj '/CN=localhost' -addext 'subjectAltName=IP:127.0.0.1,DNS:localhost'
          if ($LASTEXITCODE -ne 0) { throw 'Could not create updater test TLS certificate' }
          $server = Start-Process python -ArgumentList @(
            'scripts/updater_test_server.py',
            '--directory', $env:UPDATER_E2E_ROOT,
            '--certificate', $certificate,
            '--private-key', $privateKey
          ) -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 40; $attempt++) {
              curl.exe --insecure --silent --fail https://127.0.0.1:18443/latest.json | Out-Null
              if ($LASTEXITCODE -eq 0) { $ready = $true; break }
              Start-Sleep -Milliseconds 250
            }
            if (-not $ready) { throw 'Updater test HTTPS server did not start' }
            Start-Process $env:UPDATER_E2E_BASE -ArgumentList '/S' -Wait
            $app = Get-ChildItem "$env:LOCALAPPDATA\Programs" -Recurse -File -Filter '*.exe' |
              Where-Object { $_.Name -notmatch 'uninstall|sidecar' -and (Test-Path (Join-Path $_.DirectoryName 'job-assistant-sidecar.exe')) } |
              Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if (-not $app) { throw 'Installed updater test application was not found' }
            $marker = Join-Path $env:RUNNER_TEMP 'updater-e2e-result.json'
            $env:AI_JOB_APP_UPDATER_E2E_RESULT = $marker
            $env:AI_JOB_APP_UPDATER_E2E_EXPECTED = '0.2.1'
            Start-Process $app.FullName | Out-Null
            $deadline = (Get-Date).AddMinutes(8)
            $result = $null
            while ((Get-Date) -lt $deadline) {
              if (Test-Path $marker) {
                try { $result = Get-Content -Raw -Encoding UTF8 $marker | ConvertFrom-Json } catch { $result = $null }
                if ($result.stage -in @('restarted', 'failed')) { break }
              }
              Start-Sleep -Seconds 2
            }
            if (-not $result) { throw 'Updater test did not produce a result' }
            if ($result.stage -eq 'failed') { throw "Updater test failed: $($result.error)" }
            if (-not $result.ok -or $result.version -ne '0.2.1' -or $result.progressEvents -lt 1 -or $result.downloadedBytes -lt 1) {
              throw "Updater end-to-end assertions failed: $($result | ConvertTo-Json -Compress)"
            }
          } finally {
            if ($server -and -not $server.HasExited) { Stop-Process -Id $server.Id -Force }
          }

  desktop:
    name: Build and smoke-test ${{ matrix.artifact }}
    needs: [quality, secret-history, updater-e2e]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-x86_64
          - os: macos-15-intel
            artifact: macos-x86_64
          - os: macos-15
            artifact: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.13.6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.24
          enable-cache: true
          cache-dependency-glob: sidecar/uv.lock
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Require updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) { throw 'Missing TAURI_SIGNING_PRIVATE_KEY' }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) { throw 'Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD' }
      - name: Build signed updater artifacts and unsigned platform installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.os, 'macos-') && '-' || '' }}
        run: npm run tauri:bundle
      - name: Prepare immutable release assets
        shell: pwsh
        run: |
          $version = (Get-Content -Raw -Encoding UTF8 package.json | ConvertFrom-Json).version
          $releaseDirectory = Join-Path $PWD 'release-assets'
          New-Item -ItemType Directory -Force -Path $releaseDirectory | Out-Null
          if ($env:RUNNER_OS -eq 'Windows') {
            $installer = Get-ChildItem 'src-tauri/target/release/bundle/nsis' -Filter '*.exe' | Select-Object -First 1
            if (-not $installer -or -not (Test-Path "$($installer.FullName).sig")) { throw 'Expected signed NSIS updater artifacts' }
            $name = "ai-job-app-v$version-windows-x86_64-unsigned-setup.exe"
            Copy-Item $installer.FullName (Join-Path $releaseDirectory $name)
            Copy-Item "$($installer.FullName).sig" (Join-Path $releaseDirectory "$name.sig")
          } else {
            $dmg = Get-ChildItem 'src-tauri/target/release/bundle/dmg' -Filter '*.dmg' | Select-Object -First 1
            $updater = Get-ChildItem 'src-tauri/target/release/bundle/macos' -Filter '*.app.tar.gz' | Select-Object -First 1
            if (-not $dmg -or -not $updater -or -not (Test-Path "$($updater.FullName).sig")) { throw 'Expected DMG and signed app.tar.gz updater artifacts' }
            $dmgName = "ai-job-app-v$version-${{ matrix.artifact }}-unsigned.dmg"
            $updaterName = "ai-job-app-v$version-${{ matrix.artifact }}-unsigned.app.tar.gz"
            Copy-Item $dmg.FullName (Join-Path $releaseDirectory $dmgName)
            Copy-Item $updater.FullName (Join-Path $releaseDirectory $updaterName)
            Copy-Item "$($updater.FullName).sig" (Join-Path $releaseDirectory "$updaterName.sig")
          }
          node scripts/generate-sbom.mjs (Join-Path $releaseDirectory "ai-job-app-v$version-${{ matrix.artifact }}.cdx.json") "${{ matrix.artifact }}"
          $checksum = Get-ChildItem $releaseDirectory -File | Sort-Object Name | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          }
          [IO.File]::WriteAllLines((Join-Path $releaseDirectory "SHA256SUMS-${{ matrix.artifact }}.txt"), $checksum, [Text.UTF8Encoding]::new($false))
      - name: Windows NSIS install, upgrade, sidecar and retention smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem release-assets -Filter '*-setup.exe' | Select-Object -First 1
          Start-Process $installer.FullName -ArgumentList '/S' -Wait
          Start-Process $installer.FullName -ArgumentList '/S' -Wait
          $app = Get-ChildItem "$env:LOCALAPPDATA\Programs" -Recurse -File -Filter '*.exe' |
            Where-Object { $_.Name -notmatch 'uninstall|sidecar' -and (Test-Path (Join-Path $_.DirectoryName 'job-assistant-sidecar.exe')) } |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $app) { throw 'Installed application executable was not found' }
          $legacyDirectory = Join-Path $env:APPDATA 'com.localfirst.aijobapp'
          New-Item -ItemType Directory -Force -Path $legacyDirectory | Out-Null
          $env:LEGACY_DATABASE = Join-Path $legacyDirectory 'ai-job-app.db'
          $env:LEGACY_FIXTURE = Join-Path $PWD 'src-tauri/tests/fixtures/v0.1.7.sql'
          python -c "import os,sqlite3; c=sqlite3.connect(os.environ['LEGACY_DATABASE']); c.executescript(open(os.environ['LEGACY_FIXTURE'],encoding='utf-8').read()); c.close()"
          $marker = Join-Path $env:RUNNER_TEMP 'desktop-smoke.json'
          $env:AI_JOB_APP_SMOKE_RESULT = $marker
          Start-Process $app.FullName -Wait
          $result = Get-Content -Raw -Encoding UTF8 $marker | ConvertFrom-Json
          if (-not $result.ok -or $result.schemaVersion -lt 5) { throw 'Application/database/sidecar smoke failed' }
          $database = Join-Path $env:APPDATA 'io.github.kylekw.aijobapp\ai-job-app.db'
          if (-not (Test-Path $database)) { throw 'Application database was not created' }
          if (-not (Test-Path $env:LEGACY_DATABASE)) { throw 'v0.1.7 legacy data was not retained after migration' }
          $uninstaller = Get-ChildItem $app.DirectoryName -Filter 'uninstall*.exe' | Select-Object -First 1
          if ($uninstaller) { Start-Process $uninstaller.FullName -ArgumentList '/S' -Wait }
          if (-not (Test-Path $database)) { throw 'Normal uninstall unexpectedly removed user data' }
      - name: macOS DMG mount, launch, database and sidecar smoke
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          dmg="$(find release-assets -name '*.dmg' -print -quit)"
          mount="$RUNNER_TEMP/aijob-dmg"
          marker="$RUNNER_TEMP/desktop-smoke.json"
          mkdir -p "$mount"
          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount"
          app="$(find "$mount" -maxdepth 1 -name '*.app' -print -quit)"
          binary="$(find "$app/Contents/MacOS" -maxdepth 1 -type f -perm +111 ! -name '*sidecar*' -print -quit)"
          legacy="$HOME/Library/Application Support/com.localfirst.aijobapp/ai-job-app.db"
          current="$HOME/Library/Application Support/io.github.kylekw.aijobapp/ai-job-app.db"
          mkdir -p "$(dirname "$legacy")"
          LEGACY_DATABASE="$legacy" LEGACY_FIXTURE="$PWD/src-tauri/tests/fixtures/v0.1.7.sql" python3 -c 'import os,sqlite3; c=sqlite3.connect(os.environ["LEGACY_DATABASE"]); c.executescript(open(os.environ["LEGACY_FIXTURE"],encoding="utf-8").read()); c.close()'
          AI_JOB_APP_SMOKE_RESULT="$marker" "$binary"
          MARKER="$marker" python3 -c 'import json,os; v=json.load(open(os.environ["MARKER"])); assert v["ok"] and v["schemaVersion"] >= 5'
          test -f "$current"
          test -f "$legacy"
          hdiutil detach "$mount"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Verify and publish immutable GitHub Release
    needs: desktop
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true
      - name: Verify artifacts and create updater manifest
        shell: bash
        run: |
          set -euo pipefail
          test "$(find release-assets -name '*windows-x86_64-unsigned-setup.exe' | wc -l)" -eq 1
          test "$(find release-assets -name '*macos-x86_64-unsigned.dmg' | wc -l)" -eq 1
          test "$(find release-assets -name '*macos-aarch64-unsigned.dmg' | wc -l)" -eq 1
          test "$(find release-assets -name '*.sig' | wc -l)" -eq 3
          test "$(find release-assets -name '*.cdx.json' | wc -l)" -eq 3
          node scripts/generate-latest-json.mjs release-assets "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME"
          node scripts/generate-third-party-list.mjs release-assets/third-party-dependencies.txt
          cp THIRD_PARTY_NOTICES.md LICENSE release-assets/
          find release-assets -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > release-assets/SHA256SUMS.txt
          node -e "const m=require('./release-assets/latest.json'); if(Object.keys(m.platforms).sort().join(',') !== 'darwin-aarch64,darwin-x86_64,windows-x86_64') process.exit(1)"
      - name: Create draft, upload once, verify, then publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; immutable releases cannot be overwritten." >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --draft \
            --title "求职舱 $GITHUB_REF_NAME" --notes-file CHANGELOG.md
          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY"
          local_count="${#assets[@]}"
          remote_count="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets | length')"
          test "$local_count" -eq "$remote_count"
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
